<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CloseFlow | High-Ticket Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBALNE --- */
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

        /* --- KURSOR GLOW --- */
        #cursor-glow {
            width: 65px; height: 65px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 75%);
            border: 1px solid rgba(255, 140, 0, 0.25);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: opacity 0.3s ease;
            display: none; /* Aktywowane przez JS na desktopie */
        }

        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; font-size: 13px; }

        /* --- VSL SECTION --- */
        .vsl-section {
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 100px;
        }

        .pill-status {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.05);
            color: #ff8c00; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 12px 28px; border-radius: 50px; display: inline-flex; align-items: center;
            animation: pulse-glow-vsl 2s infinite ease-in-out;
        }
        @keyframes pulse-glow-vsl {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 140, 0, 0.1); }
            50% { box-shadow: 0 0 25px rgba(255, 140, 0, 0.4); }
        }

        /* --- VSL CONTAINER (STYL THE CLOSER NETWORK) --- */
        .vsl-container {
            max-width: 960px; margin: 0 auto; position: relative;
            border-radius: 2.5rem; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.08);
            aspect-ratio: 16/9; box-shadow: 0 80px 150px rgba(0,0,0,0.9);
        }

        /* Maska ucinająca branding YT */
        #player-wrapper {
            position: absolute; inset: 0; z-index: 1;
            transform: scale(1.06); 
        }
        #yt-player { width: 100%; height: 100%; pointer-events: none; }

        /* --- LIQUID GLASS OVERLAY --- */
        #video-overlay {
            position: absolute; inset: 0; z-index: 20;
            backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        .liquid-glass-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 100px;
            padding: 20px 45px; color: #fff; font-weight: 500; font-size: 17px;
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .liquid-glass-btn:hover { transform: scale(1.05); border-color: #ff8c00; }

        /* --- MINI CONTROLS PO STARCIE --- */
        #mini-controls {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .glass-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: 0.3s;
        }
        .glass-circle:hover { border-color: #ff8c00; transform: scale(1.1); }

        /* --- SEKACJA CTA I FORMULARZA --- */
        .cta-premium {
            background: #ff8c00; color: #fff; padding: 24px 70px; border-radius: 100px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; font-size: 13px;
            box-shadow: 0 20px 50px rgba(255, 140, 0, 0.3); transition: all 0.4s ease; display: inline-block;
        }
        .cta-premium:hover { transform: translateY(-5px); box-shadow: 0 30px 70px rgba(255, 140, 0, 0.5); }

        .form-frame-wrapper {
            max-width: 560px; margin: 0 auto; height: 600px; border-radius: 40px;
            background: #000; border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden; position: relative;
        }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <div class="vsl-section">
        <nav class="pt-16 pb-12 text-center">
            <h1 class="brand-logo">CloseFlow</h1>
        </nav>

        <section class="px-6">
            <div class="max-w-6xl mx-auto text-center">
                <div class="mb-14">
                    <div class="pill-status">• Złóż aplikację — liczba miejsc ograniczona •</div>
                </div>
                
                <div class="vsl-container" id="vsl-box">
                    <div id="video-overlay">
                        <button class="liquid-glass-btn" onclick="startVSL()">
                            <span class="w-10 h-10 rounded-full bg-[#ff8c00] flex items-center justify-center shadow-lg">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </span>
                            Odsłuchaj nagranie
                        </button>
                    </div>

                    <div id="player-wrapper">
                        <div id="yt-player"></div>
                    </div>

                    <div id="mini-controls">
                        <button class="glass-circle" onclick="toggleVSL()">
                            <svg id="p-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section class="py-40 px-6 text-center bg-black">
        <div class="max-w-4xl mx-auto">
            <h2 class="serif text-5xl md:text-7xl mb-14 leading-[1.05] text-white">
                To jest Twoja szansa na otrzymanie <br>
                <span class="italic font-light opacity-80 text-zinc-300">prawdziwego szkolenia</span> — i dołączenie do <br>
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            <a href="#aplikuj" class="cta-premium">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-32 px-6 bg-black border-t border-white/5">
        <div class="form-frame-wrapper" id="tally-box">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" width="100%" height="650" frameborder="0"></iframe>
        </div>
    </section>

    <footer class="py-20 text-center bg-black border-t border-white/5">
        <p class="text-zinc-800 text-[10px] tracking-[0.5em] uppercase">© 2026 CloseFlow</p>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const overlay = document.getElementById('video-overlay');
        const controls = document.getElementById('mini-controls');
        const icon = document.getElementById('p-icon');
        const glow = document.getElementById('cursor-glow');
        const tallyBox = document.getElementById('tally-box');

        // Inicjalizacja YouTube
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'nLx-ZWkzIEI',
                playerVars: { 
                    'autoplay': 0, 'controls': 0, 'rel': 0, 'modestbranding': 1,
                    'disablekb': 1, 'iv_load_policy': 3, 'fs': 0
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        // Start wideo
        function startVSL() {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                controls.style.opacity = '1';
                controls.style.pointerEvents = 'auto';
                player.playVideo();
            }, 800);
        }

        // Pauza/Play
        function toggleVSL() {
            const state = player.getPlayerState();
            if (state === 1) player.pauseVideo();
            else player.playVideo();
        }

        function onPlayerStateChange(event) {
            if (event.data === 1) { // Gra
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else { // Pauza
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="#fff" stroke="none"></polygon>';
            }
        }

        // KURSOR GLOW + INTELIGENTNE CHOWANIE
        if (window.matchMedia("(pointer: fine)").matches) {
            glow.style.display = 'block';
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';

                // Wykrywanie pozycji formularza
                const rect = tallyBox.getBoundingClientRect();
                const isOverForm = (
                    e.clientX >= rect.left && 
                    e.clientX <= rect.right && 
                    e.clientY >= rect.top && 
                    e.clientY <= rect.bottom
                );

                glow.style.opacity = isOverForm ? '0' : '1';
            });
        }
    </script>
</body>
</html>
