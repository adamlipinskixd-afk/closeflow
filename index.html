<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ELIMINACJA PASKA PRZEWIJANIA I POZIOMEGO SCROLLA */
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* KURSOR GLOW (TYLKO DESKTOP) */
        @media (pointer: fine) {
            #custom-cursor {
                width: 80px; height: 80px;
                background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 75%);
                border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
                transform: translate(-50%, -50%); transition: transform 0.05s linear, opacity 0.2s ease;
            }
            body, a, button { cursor: none !important; }
        }

        .serif { font-family: 'Playfair+Display', serif; }
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; }

        /* SEKCJE */
        .vsl-box { background-color: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .content-box { background-color: #000; }

        .cta-button {
            background: #ff8c00; color: #fff; padding: 18px 45px; border-radius: 50px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 13px;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(255, 140, 0, 0.4); }

        /* FORMULARZ FIX */
        .form-container {
            max-width: 500px; margin: 0 auto; height: 560px; overflow: hidden;
            background: #000; border-radius: 24px; position: relative;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 650px; border: none; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="pt-16 pb-10 text-center bg-[#0d0d0d]">
        <h1 class="brand-logo text-lg md:text-xl">CloseFlow</h1>
    </nav>

    <section class="vsl-box px-6 pb-24">
        <div class="max-w-4xl mx-auto text-center">
            <div class="mb-14">
                <span class="border border-[#ff8c00]/30 bg-[#ff8c00]/5 text-[#ff8c00] text-[9px] font-bold uppercase tracking-[0.2em] px-6 py-2.5 rounded-full">
                    • Tylko na zaproszenie • Liczba miejsc ograniczona
                </span>
            </div>
            
            <div class="rounded-3xl overflow-hidden border border-white/5 bg-black shadow-2xl">
                <div class="aspect-video flex items-center justify-center bg-zinc-950">
                    <p class="text-zinc-800 uppercase tracking-[0.5em] text-[10px] font-bold">Prezentacja wideo wkrótce</p>
                </div>
            </div>
        </div>
    </section>

    <section class="content-box py-28 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <h2 class="serif text-4xl md:text-5xl lg:text-6xl mb-10 leading-[1.15] text-white">
                To jest Twoja szansa na otrzymanie <br>
                <span class="italic font-light opacity-90 text-zinc-300">prawdziwego szkolenia</span> — i dołączenie do <br>
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            
            <p class="text-zinc-500 text-sm mb-16 tracking-wide max-w-xl mx-auto font-light">
                Dostęp jest ograniczony. Nie każda osoba, która wyśle aplikację, zostanie zakwalifikowana.
            </p>
            
            <a href="#aplikuj" class="cta-button inline-block">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-24 px-6 bg-black border-t border-white/5">
        <div class="form-container shadow-2xl shadow-orange-500/5">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" allowtransparency="true"></iframe>
        </div>
    </section>

    <script>
        const cursor = document.getElementById('custom-cursor');
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                const form = document.querySelector('.form-container');
                const rect = form.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    cursor.style.opacity = '0';
                } else {
                    cursor.style.opacity = '1';
                }
            });
        }
    </script>
</body>
</html>
