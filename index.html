<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CloseFlow | High-Ticket Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* BASE & ANTI-SCROLL */
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

        /* KURSOR SYSTEMOWY + GLOW Z LOGIKĄ CHOWANIA */
        @media (pointer: fine) {
            #cursor-glow {
                width: 65px; height: 65px;
                background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 75%);
                border: 1px solid rgba(255, 140, 0, 0.25);
                border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
                transform: translate(-50%, -50%); transition: transform 0.08s ease-out, opacity 0.3s ease;
            }
        }

        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; font-size: 13px; }

        /* VSL SEKCJA Z GRADIENTEM */
        .vsl-section {
            background: linear-gradient(to bottom, #0d0d0d 0%, #0d0d0d 85%, #000 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .pill-status {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.05);
            color: #ff8c00; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 10px 24px; border-radius: 50px; display: inline-flex; align-items: center;
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.5); }
        }

        /* VSL PLAYER - THE CLOSER NETWORK STYLE */
        .vsl-container {
            max-width: 940px; margin: 0 auto; position: relative;
            border-radius: 2.5rem; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.05);
            aspect-ratio: 16/9; box-shadow: 0 60px 150px rgba(0,0,0,0.9);
        }

        #yt-player { 
            position: absolute; top: -5px; left: -5px; width: calc(100% + 10px); height: calc(100% + 10px); 
            z-index: 1; pointer-events: none; 
        }

        /* LIQUID GLASS OVERLAY START */
        #video-overlay {
            position: absolute; inset: 0; z-index: 20;
            backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* PRZYCISKI LIQUID GLASS */
        .liquid-glass-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px;
            color: #fff; cursor: pointer; transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 15px rgba(255,255,255,0.05);
        }
        .liquid-glass-btn:hover { border-color: rgba(255, 140, 0, 0.5); transform: scale(1.05); }

        #mini-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 25; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .play-pause-glass { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* CTA SEKCJA */
        .cta-premium {
            background: #ff8c00; color: #fff; padding: 22px 65px; border-radius: 100px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; font-size: 13px;
            box-shadow: 0 15px 45px rgba(255, 140, 0, 0.25); transition: all 0.4s ease; display: inline-block;
        }
        .cta-premium:hover { transform: translateY(-5px); box-shadow: 0 25px 60px rgba(255, 140, 0, 0.45); }

        /* FORMULARZ */
        .form-frame { max-width: 540px; margin: 0 auto; height: 580px; overflow: hidden; border-radius: 40px; background: #000; position: relative; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <div class="vsl-section">
        <nav class="pt-12 pb-8 text-center">
            <h1 class="brand-logo">CloseFlow</h1>
        </nav>

        <section class="px-6 pb-32">
            <div class="max-w-5xl mx-auto text-center">
                <div class="mb-12">
                    <div class="pill-status">• Złóż aplikację — liczba miejsc ograniczona •</div>
                </div>
                
                <div class="vsl-container" id="vsl-box">
                    <div id="video-overlay">
                        <button class="liquid-glass-btn px-10 py-5 flex items-center gap-4 text-lg font-medium" onclick="handleStart()">
                            <span class="w-8 h-8 rounded-full bg-[#ff8c00] flex items-center justify-center">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </span>
                            Odsłuchaj
                        </button>
                    </div>

                    <div id="yt-player"></div>

                    <div id="mini-controls">
                        <button class="liquid-glass-btn play-pause-glass" onclick="handleToggle()">
                            <svg id="p-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section class="py-36 px-6 text-center bg-black">
        <div class="max-w-4xl mx-auto">
            <h2 class="serif text-5xl md:text-7xl mb-12 leading-[1.05] text-white">
                To jest Twoja szansa na otrzymanie <br>
                <span class="italic font-light opacity-80 text-zinc-300">prawdziwego szkolenia</span> — i dołączenie do <br>
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            <a href="#aplikuj" class="cta-premium">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-32 px-6 bg-black border-t border-white/5">
        <div class="form-frame" id="tally-box">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" width="100%" height="650" frameborder="0"></iframe>
        </div>
    </section>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'nLx-ZWkzIEI',
                playerVars: { 
                    'autoplay': 0, 'controls': 0, 'rel': 0, 'modestbranding': 1,
                    'disablekb': 1, 'iv_load_policy': 3, 'fs': 0
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function handleStart() {
            document.getElementById('video-overlay').style.opacity = "0";
            setTimeout(() => { 
                document.getElementById('video-overlay').style.display = 'none'; 
                document.getElementById('mini-controls').style.opacity = '1';
                document.getElementById('mini-controls').style.pointerEvents = 'auto';
            }, 800);
            player.playVideo();
        }

        function handleToggle() {
            const state = player.getPlayerState();
            if (state === 1) player.pauseVideo();
            else player.playVideo();
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('p-icon');
            if (event.data === 1) { 
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else {
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="#fff" stroke="none"></polygon>';
            }
        }

        // KURSOR GLOW + LOGIKA TALLY
        const glow = document.getElementById('cursor-glow');
        const tallyBox = document.getElementById('tally-box');

        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';

            const rect = tallyBox.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                glow.style.opacity = '0';
            } else {
                glow.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
