<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CloseFlow | High-Ticket Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBALNE RESETOWANIE --- */
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

        /* --- KURSOR GLOW --- */
        #cursor-glow {
            width: 65px; height: 65px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 75%);
            border: 1px solid rgba(255, 140, 0, 0.25);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: opacity 0.3s ease;
            display: none;
        }

        /* --- TYPOGRAFIA PREMIUM --- */
        .serif-premium { 
            font-family: 'Cormorant Garamond', serif; 
            letter-spacing: -0.01em;
            line-height: 1.1;
        }
        
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; font-size: 13px; }

        /* --- VSL SECTION --- */
        .vsl-section {
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 100px;
        }

        .pill-status {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.05);
            color: #ff8c00; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 12px 28px; border-radius: 50px; display: inline-flex; align-items: center;
        }

        /* --- VSL CONTAINER --- */
        .vsl-container {
            max-width: 960px; margin: 0 auto; position: relative;
            border-radius: 2.5rem; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.08);
            aspect-ratio: 16/9; box-shadow: 0 80px 150px rgba(0,0,0,0.9);
        }

        #yt-player { 
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; 
        }

        /* --- LIQUID GLASS OVERLAY --- */
        #video-overlay {
            position: absolute; inset: 0; z-index: 10;
            backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        .liquid-glass-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 100px;
            padding: 20px 45px; color: #fff; font-weight: 500; font-size: 17px;
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .liquid-glass-btn:hover { transform: scale(1.05); border-color: #ff8c00; }

        /* --- CTA I FORMULARZ --- */
        .cta-premium {
            background: #ff8c00; color: #fff; padding: 22px 60px; border-radius: 100px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; font-size: 12px;
            display: inline-block; transition: 0.4s; text-decoration: none;
            box-shadow: 0 15px 40px rgba(255, 140, 0, 0.3);
        }
        .cta-premium:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(255, 140, 0, 0.5); }

        .form-frame-wrapper {
            max-width: 560px; margin: 0 auto; height: 600px; border-radius: 40px;
            background: #000; border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden; position: relative;
        }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <div class="vsl-section">
        <nav class="pt-16 pb-12 text-center">
            <h1 class="brand-logo">CloseFlow</h1>
        </nav>

        <section class="px-6">
            <div class="max-w-6xl mx-auto text-center">
                <div class="mb-14">
                    <div class="pill-status">• Aplikacja otwarta •</div>
                </div>
                
                <div class="vsl-container" id="vsl-box">
                    <div id="video-overlay">
                        <button class="liquid-glass-btn" onclick="startVSL()">
                            <span class="w-10 h-10 rounded-full bg-[#ff8c00] flex items-center justify-center shadow-lg">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </span>
                            Odsłuchaj nagranie
                        </button>
                    </div>
                    <div id="yt-player"></div>
                </div>
            </div>
        </section>
    </div>

    <section class="py-44 px-6 text-center bg-black">
        <div class="max-w-5xl mx-auto">
            <h2 class="serif-premium text-5xl md:text-7xl mb-8 text-white">
                Nie każdy dostaje taką szansę. <br>
                <span class="italic font-medium text-zinc-200">Prawdziwy trening sprzedaży, realna zmiana życia</span> <br>
                oraz możliwość wejścia do świata <span class="text-[#ff8c00]">high-ticket</span>
            </h2>
            <p class="text-zinc-500 text-lg mb-20 tracking-widest font-light opacity-80 uppercase">
                wypełnij formularz — liczba miejsc jest ograniczona
            </p>
            <a href="#aplikuj" class="cta-premium">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-32 px-6 bg-black border-t border-white/5">
        <div class="form-frame-wrapper" id="tally-box">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" width="100%" height="650" frameborder="0"></iframe>
        </div>
    </section>

    <footer class="py-20 text-center bg-black border-t border-white/5 opacity-40">
        <p class="text-[10px] tracking-[0.5em] uppercase">© 2026 CloseFlow</p>
    </footer>

    <script>
        let player;
        const glow = document.getElementById('cursor-glow');
        const tallyBox = document.getElementById('tally-box');
        const vslBox = document.getElementById('vsl-box');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'nLx-ZWkzIEI',
                playerVars: { 
                    'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1,
                    'iv_load_policy': 3, 'showinfo': 0
                },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            event.target.mute();
            event.target.playVideo();
            setTimeout(() => {
                event.target.pauseVideo();
                event.target.unMute();
            }, 500);
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function startVSL() {
            const overlay = document.getElementById('video-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                if (player && player.playVideo) player.playVideo();
            }, 600);
        }

        if (window.matchMedia("(pointer: fine)").matches) {
            glow.style.display = 'block';
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';

                const fRect = tallyBox.getBoundingClientRect();
                const isOverForm = (e.clientX >= fRect.left && e.clientX <= fRect.right && e.clientY >= fRect.top && e.clientY <= fRect.bottom);
                
                const vRect = vslBox.getBoundingClientRect();
                const isOverVideo = (e.clientX >= vRect.left && e.clientX <= vRect.right && e.clientY >= vRect.top && e.clientY <= vRect.bottom);

                glow.style.opacity = (isOverForm || isOverVideo) ? '0' : '1';
            });
        }
    </script>
</body>
</html>
