<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        
        .orange-text { 
            color: #ff8c00; 
            letter-spacing: 0.2em;
        }

        .pill-button {
            border: 1px solid #ff8c00;
            background: rgba(255, 140, 0, 0.05);
            color: #ff8c00;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 11px;
            letter-spacing: 0.15em;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
            font-weight: 600;
        }

        .pill-dot {
            height: 8px;
            width: 8px;
            background-color: #ff8c00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
        }

        /* Kontener dla Tally, by nie było widać granatu */
        .form-wrapper {
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto px-6 py-16 text-center">
        
        <div class="mb-6">
            <h1 class="text-2xl md:text-3xl font-light uppercase orange-text tracking-[0.4em]">
                CloseFlow
            </h1>
        </div>

        <div class="mb-20">
            <div class="pill-button">
                <span class="pill-dot"></span>
                Invitation-Based • Limited Spots
            </div>
        </div>

        <div class="rounded-3xl overflow-hidden border border-white/5 mb-24 bg-zinc-950">
            <div class="aspect-video flex items-center justify-center">
                <p class="text-zinc-700 uppercase tracking-widest text-[10px]">Video Presentation Coming Soon</p>
            </div>
        </div>

        <div class="form-wrapper max-w-xl mx-auto">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" 
                    width="100%" 
                    height="700" 
                    frameborder="0"></iframe>
        </div>

    </div>

</body>
</html>
