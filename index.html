<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow | High-Ticket Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* KURSOR Z GLOW - INTELIGENTNY */
        #cursor-glow {
            width: 65px; height: 65px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 75%);
            border: 1px solid rgba(255, 140, 0, 0.25);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: opacity 0.3s ease;
            display: none;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; font-size: 13px; }

        /* VSL SEKCJA */
        .vsl-section {
            background: linear-gradient(to bottom, #0d0d0d 0%, #0d0d0d 85%, #000 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 80px;
        }

        .pill-status {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.05);
            color: #ff8c00; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 10px 24px; border-radius: 50px; display: inline-flex; align-items: center;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.1); }
            50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); }
        }

        /* VSL PLAYER - TRUE LIQUID GLASS */
        .vsl-container {
            max-width: 940px; margin: 0 auto; position: relative;
            border-radius: 2.5rem; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.05);
            aspect-ratio: 16/9; box-shadow: 0 60px 150px rgba(0,0,0,0.9);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* OVERLAY - MOCNY LIQUID GLASS */
        #video-overlay {
            position: absolute; inset: 0; z-index: 20;
            backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .liquid-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px;
            color: #fff; cursor: pointer; transition: all 0.3s ease;
            padding: 18px 40px; font-weight: 500; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .liquid-btn:hover { border-color: #ff8c00; transform: scale(1.05); }

        /* MINI CONTROLS - SZKŁO */
        #mini-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .glass-circle {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .cta-premium {
            background: #ff8c00; color: #fff; padding: 22px 65px; border-radius: 100px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; font-size: 12px;
            box-shadow: 0 15px 45px rgba(255, 140, 0, 0.3); transition: all 0.4s ease; display: inline-block;
        }

        .form-frame { max-width: 540px; margin: 0 auto; height: 580px; overflow: hidden; border-radius: 40px; background: #000; position: relative; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <div class="vsl-section">
        <nav class="pt-10 pb-8 text-center">
            <h1 class="brand-logo">CloseFlow</h1>
        </nav>

        <section class="px-6">
            <div class="max-w-5xl mx-auto text-center">
                <div class="mb-10">
                    <div class="pill-status">• Złóż aplikację — liczba miejsc ograniczona •</div>
                </div>
                
                <div class="vsl-container">
                    <div id="video-overlay">
                        <button class="liquid-btn" onclick="startVideo()">
                            <span class="w-10 h-10 rounded-full bg-[#ff8c00] flex items-center justify-center shadow-lg">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </span>
                            Odsłuchaj
                        </button>
                    </div>

                    <video id="main-video" playsinline>
                        <source src="https://drive.google.com/drive/folders/1eymWFFnxowul8Agy8GoLMNlTMK9ZRQWW?hl=pl">
                        Twoja przeglądarka nie obsługuje wideo.
                    </video>

                    <div id="mini-controls">
                        <button class="glass-circle" onclick="toggleVideo()">
                            <svg id="p-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section class="py-32 px-6 text-center bg-black">
        <div class="max-w-4xl mx-auto">
            <h2 class="serif text-5xl md:text-7xl mb-12 leading-[1.1] text-white">
                To jest Twoja szansa na otrzymanie <br>
                <span class="italic font-light opacity-80 text-zinc-300">prawdziwego szkolenia</span> — i dołączenie do <br>
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            <a href="#aplikuj" class="cta-premium">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-32 px-6 bg-black border-t border-white/5">
        <div class="form-frame" id="tally-box">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" width="100%" height="650" frameborder="0"></iframe>
        </div>
    </section>

    <script>
        const video = document.getElementById('main-video');
        const overlay = document.getElementById('video-overlay');
        const controls = document.getElementById('mini-controls');
        const icon = document.getElementById('p-icon');

        function startVideo() {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                controls.style.opacity = '1';
                controls.style.pointerEvents = 'auto';
                video.play();
            }, 800);
        }

        function toggleVideo() {
            if (video.paused) {
                video.play();
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else {
                video.pause();
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="#fff" stroke="none"></polygon>';
            }
        }

        // KURSOR GLOW + TALLY LOGIC
        const glow = document.getElementById('cursor-glow');
        if (window.matchMedia("(pointer: fine)").matches) {
            glow.style.display = 'block';
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';

                const rect = document.getElementById('tally-box').getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    glow.style.opacity = '0';
                } else {
                    glow.style.opacity = '1';
                }
            });
        }
    </script>
</body>
</html>
