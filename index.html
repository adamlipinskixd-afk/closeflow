<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }
        
        /* LOGO STYL */
        .brand-logo { 
            color: #ff8c00; 
            letter-spacing: 0.5em;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* SUBTELNY PASEK ODDZIELAJĄCY */
        .divider-line {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            margin-bottom: 50px;
        }

        /* PULSUJĄCY PRZYCISK (INVITATION BASED) */
        .pill-button {
            border: 1px solid rgba(255, 140, 0, 0.4);
            background: rgba(255, 140, 0, 0.02);
            color: #ff8c00;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 10px;
            letter-spacing: 0.2em;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
            font-weight: 600;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .pill-dot {
            height: 6px;
            width: 6px;
            background-color: #ff8c00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #ff8c00;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.1); border-color: rgba(255, 140, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.3); border-color: rgba(255, 140, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.1); border-color: rgba(255, 140, 0, 0.3); }
        }

        /* KONTENER FORMULARZA */
        .form-container {
            background-color: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="pt-12 pb-8 text-center">
        <h1 class="brand-logo text-xl md:text-2xl">
            CloseFlow
        </h1>
    </div>

    <div class="divider-line"></div>

    <div class="max-w-4xl mx-auto px-6 text-center">
        
        <div class="mb-16">
            <div class="pill-button">
                <span class="pill-dot"></span>
                Tylko dla zaproszonych • Ograniczona liczba miejsc
            </div>
        </div>

        <div class="rounded-2xl overflow-hidden border border-white/5 mb-20 bg-zinc-950 shadow-2xl">
            <div class="aspect-video flex items-center justify-center">
                <p class="text-zinc-700 uppercase tracking-[0.3em] text-[9px] font-semibold">Prezentacja wideo wkrótce</p>
            </div>
        </div>

        <div class="form-container max-w-lg mx-auto pb-20">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" 
                    width="100%" 
                    height="650" 
                    frameborder="0"></iframe>
        </div>

    </div>

</body>
</html>
