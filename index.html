<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CloseFlow | High-Ticket Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

        /* KURSOR: SYSTEMOWY + GLOW */
        @media (pointer: fine) {
            #cursor-glow {
                width: 60px; height: 60px;
                background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 70%);
                border: 1px solid rgba(255, 140, 0, 0.2);
                border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
                transform: translate(-50%, -50%); transition: transform 0.1s linear;
            }
        }

        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { color: #ff8c00; letter-spacing: 0.6em; font-weight: 300; text-transform: uppercase; font-size: 13px; }

        .vsl-section {
            background: linear-gradient(to bottom, #0d0d0d 0%, #0d0d0d 85%, #000 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .pill-status {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.05);
            color: #ff8c00; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
            padding: 10px 24px; border-radius: 50px; display: inline-flex; align-items: center;
            animation: pulse-glow-border 2s infinite ease-in-out;
        }
        @keyframes pulse-glow-border {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); }
        }

        /* VSL CONTAINER SYSTEM */
        .vsl-container {
            max-width: 900px; margin: 0 auto; position: relative;
            border-radius: 1.5rem; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.05);
            aspect-ratio: 16/9; box-shadow: 0 30px 100px rgba(0,0,0,0.9);
        }

        #yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        /* LIQUID GLASS OVERLAY */
        #video-overlay {
            position: absolute; inset: 0; z-index: 20;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s ease;
        }

        .glass-pill {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 140, 0, 0.5); border-radius: 100px;
            padding: 14px 32px; color: #fff; font-weight: 600;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .glass-pill:hover { transform: scale(1.05); background: rgba(255,255,255,0.08); }

        /* PLAY/PAUSE MINI GLASS */
        #mini-controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .glass-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 140, 0, 0.3);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .cta-premium {
            background: #ff8c00; color: #fff; padding: 20px 52px; border-radius: 100px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; font-size: 12px;
            box-shadow: 0 10px 40px rgba(255, 140, 0, 0.2); transition: all 0.4s ease; display: inline-block;
        }
        .cta-premium:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(255, 140, 0, 0.4); }

        .form-frame { max-width: 520px; margin: 0 auto; height: 565px; overflow: hidden; border-radius: 32px; background: #000; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <div class="vsl-section">
        <nav class="pt-10 pb-6 text-center">
            <h1 class="brand-logo">CloseFlow</h1>
        </nav>

        <section class="px-6 pb-24">
            <div class="max-w-5xl mx-auto text-center">
                <div class="mb-10">
                    <div class="pill-status">• Złóż aplikację — liczba miejsc ograniczona •</div>
                </div>
                
                <div class="vsl-container" id="vsl-box">
                    <div id="video-overlay">
                        <button class="glass-pill" onclick="startVideo()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                            Odsłuchaj
                        </button>
                    </div>

                    <div id="yt-player"></div>

                    <div id="mini-controls">
                        <div class="glass-circle" onclick="togglePlay()">
                            <svg id="p-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section class="py-32 px-6 text-center bg-black">
        <div class="max-w-4xl mx-auto">
            <h2 class="serif text-4xl md:text-6xl lg:text-[70px] mb-12 leading-[1.1] text-white">
                To jest Twoja szansa na otrzymanie <br>
                <span class="italic font-light opacity-80 text-zinc-300">prawdziwego szkolenia</span> — i dołączenie do <br>
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            <a href="#aplikuj" class="cta-premium">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="aplikuj" class="py-32 px-6 bg-black border-t border-white/5">
        <div class="form-frame">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" width="100%" height="650" frameborder="0"></iframe>
        </div>
    </section>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'nLx-ZWkzIEI',
                playerVars: { 'autoplay': 0, 'controls': 0, 'rel': 0, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startVideo() {
            document.getElementById('video-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('video-overlay').style.display = 'none'; }, 500);
            player.playVideo();
            document.getElementById('mini-controls').style.opacity = '1';
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state === 1) player.pauseVideo();
            else player.playVideo();
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('p-icon');
            if (event.data === 1) { // Playing
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else { // Paused
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            }
        }

        // CURSOR
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
