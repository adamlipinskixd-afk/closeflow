<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        /* CAŁKOWITE USUNIĘCIE PASKA PRZEWIJANIA */
        html, body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0;
            overflow-x: hidden; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* KURSOR GLOW */
        @media (pointer: fine) {
            #custom-cursor {
                width: 80px; height: 80px;
                background: radial-gradient(circle, rgba(255, 140, 0, 0.25) 0%, transparent 75%);
                border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
                transform: translate(-50%, -50%); transition: transform 0.05s linear, opacity 0.2s ease;
            }
        }
        @media (pointer: coarse) { #custom-cursor { display: none !important; } }

        /* BRANDING */
        .brand-logo { color: #ff8c00; letter-spacing: 0.5em; font-weight: 300; text-transform: uppercase; }
        
        /* SEKCJE Z GRADIENTAMI I ODCIĘCIEM */
        .vsl-section { background-color: #0f0f0f; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .hero-section { background-color: #000; }

        .hero-btn {
            background: #ff8c00; color: #fff; padding: 16px 40px; border-radius: 50px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2); transition: all 0.3s ease;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); }

        /* FORMULARZ I CIĘCIE TALLY */
        .form-wrapper {
            max-width: 550px; margin: 0 auto; height: 565px; overflow: hidden;
            background: #000; border-radius: 20px; position: relative;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 650px; border: none; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="pt-12 pb-8 text-center bg-black">
        <h1 class="brand-logo text-xl md:text-2xl">CloseFlow</h1>
    </nav>

    <section class="vsl-section py-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <div class="mb-12">
                <span class="border border-[#ff8c00]/40 bg-[#ff8c00]/5 text-[#ff8c00] text-[10px] font-bold uppercase tracking-widest px-5 py-2.5 rounded-full">
                    • Invitation-Based • Limited Spots
                </span>
            </div>
            <div class="rounded-2xl overflow-hidden border border-white/5 bg-black shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                <div class="aspect-video flex items-center justify-center">
                    <p class="text-zinc-800 uppercase tracking-[0.4em] text-[10px] font-bold">Prezentacja CloseFlow wkrótce</p>
                </div>
            </div>
        </div>
    </section>

    <section class="hero-section py-24 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-medium mb-6 leading-tight text-zinc-100">
                To jest Twoja szansa na otrzymanie <br> 
                <span class="italic font-light">prawdziwego szkolenia</span> — i dołączenie do
                <span class="text-[#ff8c00]">High-Ticket Offer</span>
            </h2>
            <p class="text-zinc-500 text-sm mb-12 tracking-wide">
                Dostęp jest ograniczony. Nie każdy kto aplikuje otrzyma dostęp.
            </p>
            <a href="#form-section" class="hero-btn inline-block">Złóż aplikację teraz →</a>
        </div>
    </section>

    <section id="form-section" class="py-24 px-6 bg-black border-t border-white/5">
        <div class="form-wrapper shadow-2xl shadow-orange-500/5">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" allowtransparency="true"></iframe>
        </div>
    </section>

    <script>
        const cursor = document.getElementById('custom-cursor');
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                const form = document.querySelector('.form-wrapper');
                const rect = form.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    cursor.style.opacity = '0';
                } else {
                    cursor.style.opacity = '1';
                }
            });
        }
    </script>
</body>
</html>
