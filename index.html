<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        /* PODSTAWA */
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow-x: hidden;
            cursor: none !important; /* Ukrywamy systemowy kursor */
        }

        /* CUSTOM CURSOR - PUNKT (3) */
        #custom-cursor {
            width: 12px;
            height: 12px;
            background: #ff8c00;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999999;
            box-shadow: 0 0 15px #ff8c00, 0 0 30px #ff8c00;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* LOGO I LINIA (2) */
        .brand-logo { 
            color: #ff8c00; 
            letter-spacing: 0.5em; 
            font-weight: 300; 
            text-transform: uppercase; 
        }
        .divider-line { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            width: 100%; 
            margin-bottom: 50px; 
        }

        /* PULSUJĄCA PIGUŁKA */
        .pill-button {
            border: 1px solid rgba(255, 140, 0, 0.4);
            background: rgba(255, 140, 0, 0.02);
            color: #ff8c00;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 10px;
            letter-spacing: 0.2em;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
            font-weight: 600;
            animation: pulse-glow 3s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.1); border-color: rgba(255, 140, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.3); border-color: rgba(255, 140, 0, 0.8); }
        }

        /* SZKLANE VSL (1) */
        .glass-vsl {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 140, 0, 0.1);
            position: relative;
        }

        /* KONTENER FORMULARZA - UKRYWANIE STOPKI (4) */
        .form-wrapper {
            max-width: 550px;
            margin: 0 auto;
            height: 560px; /* Przycinamy, żeby nie było widać "Made by Tally" */
            overflow: hidden;
            background: #000;
            border-radius: 20px;
        }

        /* Wymuszamy brak kursora na iframe */
        iframe { cursor: none !important; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="pt-12 pb-8 text-center">
        <h1 class="brand-logo text-xl md:text-2xl">CloseFlow</h1>
    </div>

    <div class="divider-line"></div>

    <div class="max-w-4xl mx-auto px-6 text-center">
        
        <div class="mb-16">
            <div class="pill-button">
                <span class="h-1.5 w-1.5 bg-[#ff8c00] rounded-full mr-2.5 shadow-[0_0_8px_#ff8c00]"></span>
                Tylko dla zaproszonych • Ograniczona liczba miejsc
            </div>
        </div>

        <div class="glass-vsl rounded-3xl mb-24 shadow-2xl">
            <div class="aspect-video flex items-center justify-center">
                <p class="text-zinc-700 uppercase tracking-[0.3em] text-[9px] font-semibold">Prezentacja wideo wkrótce</p>
            </div>
        </div>

        <div class="form-wrapper shadow-2xl shadow-orange-500/5">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" 
                    width="100%" 
                    height="650" 
                    frameborder="0"
                    style="cursor: none !important;"></iframe>
        </div>

    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        
        // Ruch kropki
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Reakcja na kliknięcie
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
