<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow | Elite Closing Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* GŁĘBOKA CZERŃ I TYPOGRAFIA */
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        
        .orange-glow { 
            color: #ff8c00; 
            text-shadow: 0 0 20px rgba(255,140,0,0.4);
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* NAPRAWA FORMULARZA - ŻEBY SIĘ NIE ZLEWAŁ */
        .tally-container {
            background: #000; /* Wymuszamy czarne tło pod kontenerem */
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,140,0,0.1);
        }

        /* ANIMACJA ZMIENIAJĄCYCH SIĘ NAPISÓW */
        .word-flicker {
            display: inline-block;
            min-width: 200px;
        }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto px-6 py-24 text-center">
        <h1 class="text-6xl md:text-8xl font-black mb-12 italic uppercase tracking-tighter">
            Elite <span class="orange-glow word-flicker" id="dynamic-word">Closing</span>
        </h1>

        <div class="rounded-3xl overflow-hidden border border-white/10 mb-32 bg-zinc-950 shadow-inner">
            <div class="aspect-video flex items-center justify-center">
                <p class="text-zinc-600 tracking-widest uppercase text-xs">Waiting for VSL signal...</p>
            </div>
        </div>

        <div class="tally-container max-w-2xl mx-auto shadow-2xl shadow-orange-500/5">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" 
                    width="100%" 
                    height="600" 
                    frameborder="0" 
                    title="Application Form"></iframe>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // LOGIKA ZMIENIAJĄCYCH SIĘ NAPISÓW
        const words = ["Closing", "Network", "Flow", "Success"];
        let i = 0;
        setInterval(() => {
            const wordEl = document.getElementById('dynamic-word');
            wordEl.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % words.length;
                wordEl.innerText = words[i];
                wordEl.style.opacity = 1;
            }, 500);
        }, 3000);
    </script>
</body>
</html>
