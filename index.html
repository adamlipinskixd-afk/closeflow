<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0;
        }

        /* SUBTELNY GLOWING EFFECT (TYLKO DESKTOP) */
        @media (pointer: fine) {
            #custom-cursor {
                width: 60px; /* Zmniejszony blask */
                height: 60px;
                background: radial-gradient(circle, rgba(255, 140, 0, 0.1) 0%, transparent 75%);
                border-radius: 50%;
                position: fixed;
                pointer-events: none; /* Pozwala klikać we wszystko pod spodem */
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: transform 0.05s linear;
                display: block;
            }
        }

        /* UKRYWANIE NA DOTYKU */
        @media (pointer: coarse) {
            #custom-cursor { display: none !important; }
        }

        .brand-logo { color: #ff8c00; letter-spacing: 0.5em; font-weight: 300; text-transform: uppercase; }
        .divider-line { border-bottom: 1px solid rgba(255, 255, 255, 0.08); width: 100%; margin-bottom: 50px; }

        .pill-button {
            border: 1px solid rgba(255, 140, 0, 0.4); background: rgba(255, 140, 0, 0.02);
            color: #ff8c00; padding: 10px 24px; border-radius: 50px; font-size: 10px;
            letter-spacing: 0.2em; display: inline-flex; align-items: center; 
            text-transform: uppercase; font-weight: 600; animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.1); }
            50% { box-shadow: 0 0 15px rgba(255, 140, 0, 0.2); }
        }

        .glass-vsl { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px); border: 1px solid rgba(255, 140, 0, 0.1); }

        /* FORMULARZ - PRECYZYJNE CIĘCIE */
        .form-wrapper {
            max-width: 550px; margin: 0 auto;
            height: 565px; overflow: hidden; background: #000; border-radius: 20px;
            position: relative;
        }
        
        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 650px;
            border: none; background: transparent;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="pt-12 pb-8 text-center">
        <h1 class="brand-logo text-xl md:text-2xl">CloseFlow</h1>
    </div>

    <div class="divider-line"></div>

    <div class="max-w-4xl mx-auto px-6 text-center">
        <div class="mb-16">
            <div class="pill-button">
                <span class="h-1.5 w-1.5 bg-[#ff8c00] rounded-full mr-2.5 shadow-[0_0_8px_#ff8c00]"></span>
                Tylko dla zaproszonych • Ograniczona liczba miejsc
            </div>
        </div>

        <div class="glass-vsl rounded-3xl mb-24 shadow-2xl">
            <div class="aspect-video flex items-center justify-center">
                <p class="text-zinc-700 uppercase tracking-[0.3em] text-[9px] font-semibold">Prezentacja wideo wkrótce</p>
            </div>
        </div>

        <div class="form-wrapper shadow-2xl shadow-orange-500/5">
            <iframe src="https://tally.so/r/Xxe8jV?hideTitle=1&transparentBackground=1" 
                    allowtransparency="true"></iframe>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                // SPRAWDZAMY CZY MYSZ JEST NAD FORMULARZEM
                const form = document.querySelector('.form-wrapper');
                const rect = form.getBoundingClientRect();
                
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    cursor.style.opacity = '0'; // Ukryj blask nad formularzem, by nie blokował
                } else {
                    cursor.style.opacity = '1';
                }
            });
        }
    </script>
</body>
</html>
